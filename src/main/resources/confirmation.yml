# Confirmation Menu - Конфигурация меню подтверждения покупки
# Версия: 1.0.0

# Название меню
menu:
  title: "&6&lПодтверждение покупки"
  size: 27  # Не меняйте! Должно быть 27

# Настройки элементов
items:
  # Кнопка отмены (красная)
  cancel:
    material: RED_STAINED_GLASS_PANE
    name: "&c&l✖ Отменить"
    lore:
      - "&7Нажмите, чтобы отменить покупку"
      - ""
      - "&cОтмена"
    # Слоты для кнопок отмены (слева)
    slots:
      - 0
      - 1
      - 2
      - 9
      - 10
      - 11
      - 18
      - 19
      - 20

  # Товар (центр)
  item:
    material: GOLD_INGOT
    name: "&6&lЗаказ #%order_id%"
    lore:
      - ""
      - "&7Продавец: &f%seller%"
      - "&7Коины: &e%coins_amount%"
      - "&7Цена: &e%price% виджетов"
      - ""
      - "&a&l■ &aНажмите для подтверждения"
    slot: 13  # Центральный слот

  # Кнопка подтверждения (зеленая)
  confirm:
    material: LIME_STAINED_GLASS_PANE
    name: "&a&l✔ Подтвердить"
    lore:
      - "&7Нажмите, чтобы подтвердить покупку"
      - ""
      - "&aКупить"
    # Слоты для кнопок подтверждения (справа)
    slots:
      - 6
      - 7
      - 8
      - 15
      - 16
      - 17
      - 24
      - 25
      - 26

  # Заполнитель (пустые слоты)
  filler:
    material: GRAY_STAINED_GLASS_PANE
    name: " "

# Настройки сообщений
messages:
  purchase_confirmed: "&a✓ Заказ #%order_id% успешно куплен!"
  purchase_cancelled: "&c✖ Покупка отменена."
  purchase_failed: "&c✖ Не удалось купить заказ: %error%"
